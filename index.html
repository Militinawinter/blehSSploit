<title>blehSSploit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body,html{height:100%;font-family:'Inter',sans-serif;overflow:hidden;background:#060612}

  .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,#0d0f2a 0%,#060612 60%)}
  .orb{position:absolute;border-radius:50%;filter:blur(90px)}
  .orb1{width:650px;height:650px;background:rgba(80,50,180,0.16);top:-180px;left:-180px;animation:float 8s ease-in-out infinite}
  .orb2{width:550px;height:550px;background:rgba(40,100,200,0.13);bottom:-120px;right:-120px;animation:float2 10s ease-in-out infinite}
  .orb3{width:400px;height:400px;background:rgba(160,80,255,0.11);top:50%;left:50%;transform:translate(-50%,-50%);animation:float3 12s ease-in-out infinite}
  .orb4{width:300px;height:300px;background:rgba(0,180,255,0.08);top:20%;right:15%;animation:float 14s ease-in-out infinite reverse}
  .orb5{width:200px;height:200px;background:rgba(255,80,180,0.05);bottom:25%;left:15%;animation:float2 9s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-35px) scale(1.07)}}
  @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(30px)}}
  @keyframes float3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-55%) scale(1.12)}}

  .grid{position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:60px 60px;animation:gridFade 5s ease-in-out infinite alternate}
  @keyframes gridFade{0%{opacity:0.3}100%{opacity:0.9}}

  /* Moving nebula streaks */
  .streak{position:fixed;z-index:1;pointer-events:none;border-radius:50%;filter:blur(60px);animation:streakMove linear infinite}
  .streak1{width:3px;height:300px;background:linear-gradient(to bottom,transparent,rgba(120,80,255,0.15),transparent);top:0;left:30%;animation-duration:18s;animation-name:streakFall}
  .streak2{width:3px;height:200px;background:linear-gradient(to bottom,transparent,rgba(80,160,255,0.12),transparent);top:0;left:65%;animation-duration:25s;animation-name:streakFall;animation-delay:-8s}
  @keyframes streakFall{0%{transform:translateY(-400px)}100%{transform:translateY(110vh)}}

  .particles{position:fixed;inset:0;z-index:2;pointer-events:none}
  .particle{position:absolute;border-radius:50%;animation:rise linear infinite}
  @keyframes rise{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:0.4}100%{transform:translateY(-20px) scale(1);opacity:0}}

  .page{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1),transform 0.6s cubic-bezier(0.4,0,0.2,1)}
  .page-hidden{opacity:0;pointer-events:none;transform:translateY(18px)}

  /* HOME */
  #homePage{align-items:center;justify-content:center}

  .logo-area{text-align:center;margin-bottom:52px;animation:fadeSlideUp 0.8s cubic-bezier(0.4,0,0.2,1) both}
  @keyframes fadeSlideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

  /* Roblox-style liquid glass logo */
  .logo-icon{width:64px;height:64px;margin:0 auto 18px;position:relative}
  .logo-icon svg{width:100%;height:100%;filter:drop-shadow(0 0 18px rgba(120,80,255,0.5)) drop-shadow(0 0 40px rgba(80,160,255,0.25))}

  .logo-title{font-size:30px;font-weight:600;letter-spacing:-0.5px;line-height:1;background:linear-gradient(135deg,#c084fc 0%,#818cf8 40%,#38bdf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .logo-sub{font-size:13px;color:rgba(255,255,255,0.3);font-weight:400;margin-top:7px;letter-spacing:0.6px}

  .menu-stack{display:flex;flex-direction:column;gap:12px;align-items:center;animation:fadeSlideUp 0.8s 0.15s cubic-bezier(0.4,0,0.2,1) both}

  .glass-btn{
    display:flex;align-items:center;gap:14px;
    width:280px;height:62px;padding:0 22px;
    background:rgba(255,255,255,0.055);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:20px;color:#fff;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
    text-decoration:none;cursor:pointer;
    transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
    position:relative;overflow:hidden;
    backdrop-filter:blur(40px) saturate(180%);
    -webkit-backdrop-filter:blur(40px) saturate(180%);
    box-shadow:0 2px 0 rgba(255,255,255,0.12) inset,0 -1px 0 rgba(0,0,0,0.2) inset,0 8px 32px rgba(0,0,0,0.3);
  }
  .glass-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.11),rgba(255,255,255,0));border-radius:20px 20px 0 0;pointer-events:none}
  .glass-btn::after{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(105deg,transparent,rgba(255,255,255,0.18),transparent);transform:skewX(-20deg);transition:left 0.6s ease;pointer-events:none}
  .glass-btn:hover::after{left:150%}
  .glass-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.28);transform:translateY(-3px);box-shadow:0 2px 0 rgba(255,255,255,0.18) inset,0 -1px 0 rgba(0,0,0,0.25) inset,0 16px 48px rgba(80,40,200,0.35),0 0 0 1px rgba(160,120,255,0.15)}
  .glass-btn:active{transform:translateY(-1px)}
  .btn-icon{width:22px;height:22px;object-fit:contain;flex-shrink:0;opacity:0.9;position:relative;z-index:1}
  .btn-label{flex:1;position:relative;z-index:1}
  .btn-arrow{opacity:0.35;transition:opacity 0.2s,transform 0.2s;font-size:13px;position:relative;z-index:1}
  .glass-btn:hover .btn-arrow{opacity:0.8;transform:translateX(4px)}

  .bleh-cat{position:fixed;bottom:108px;left:28px;z-index:20;width:100px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:catBob 3s ease-in-out infinite;cursor:pointer;user-select:none;-webkit-user-drag:none}
  @keyframes catBob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1.5deg)}}

  /* DOCK — longer, centered, taller */
  .dock{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:20;display:flex;gap:8px;padding:10px 16px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:28px;
    backdrop-filter:blur(60px) saturate(200%);
    -webkit-backdrop-filter:blur(60px) saturate(200%);
    box-shadow:0 2px 0 rgba(255,255,255,0.13) inset,0 -1px 0 rgba(0,0,0,0.3) inset,0 24px 64px rgba(0,0,0,0.5);
    animation:fadeSlideUp 0.8s 0.3s cubic-bezier(0.0,0.2,1) both;
    min-width:620px;justify-content:center;
  }
  .dock::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.1),rgba(255,255,255,0));border-radius:28px 28px 0 0;pointer-events:none}
  .dock-btn{
    height:52px;padding:0 24px;flex:1;
    background:rgba(255,255,255,0.055);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
    color:rgba(255,255,255,0.6);
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);white-space:nowrap;
    position:relative;overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,0.1) inset;
  }
  .dock-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent);border-radius:18px 18px 0 0;pointer-events:none}
  .dock-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
  .dock-btn.active{background:rgba(120,80,255,0.18);color:rgba(200,170,255,1);border-color:rgba(140,100,255,0.4);box-shadow:0 1px 0 rgba(200,170,255,0.15) inset,0 4px 20px rgba(100,60,255,0.25)}

  /* EXPLOIT PAGE */
  #exploitPage{padding:40px 0 0 72px;align-items:flex-start;justify-content:flex-start}

  .section-tag{font-size:11px;font-weight:600;letter-spacing:1.5px;color:rgba(160,120,255,0.75);text-transform:uppercase;margin-bottom:8px;animation:fadeSlideUp 0.6s cubic-bezier(0.4,0,0.2,1) both}
  .hub-title{font-size:24px;font-weight:600;color:#fff;letter-spacing:-0.5px;margin-bottom:20px;animation:fadeSlideUp 0.6s 0.1s cubic-bezier(0.4,0,0.2,1) both}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-bottom:20px;animation:fadeSlideUp 0.6s 0.15s cubic-bezier(0.4,0,0.2,1) both}
  .tab-btn{
    height:36px;padding:0 18px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    color:rgba(255,255,255,0.5);
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    cursor:pointer;transition:all 0.2s;
    position:relative;overflow:hidden;
    backdrop-filter:blur(20px);
  }
  .tab-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.07),transparent);pointer-events:none}
  .tab-btn:hover{color:#fff;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.18)}
  .tab-btn.active{background:rgba(120,80,255,0.18);color:rgba(200,170,255,1);border-color:rgba(140,100,255,0.4);box-shadow:0 1px 0 rgba(200,170,255,0.1) inset}

  .exploit-panel{display:none}
  .exploit-panel.visible{display:flex;flex-direction:column;gap:8px;width:500px;height:calc(100vh - 220px);overflow-y:auto;padding-right:10px;padding-bottom:100px}
  .exploit-panel::-webkit-scrollbar{width:0}

  .exploit-item{animation:fadeSlideUp 0.5s cubic-bezier(0.4,0,0.2,1) both}

  .exploit-btn{
    width:100%;height:62px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;color:#fff;
    font-family:'Inter',sans-serif;font-size:15px;font-weight:500;
    text-align:left;padding:0 22px;cursor:pointer;
    transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
    display:flex;align-items:center;justify-content:space-between;
    position:relative;overflow:hidden;
    backdrop-filter:blur(20px);
    box-shadow:0 1px 0 rgba(255,255,255,0.08) inset;
  }
  .exploit-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.07),transparent);border-radius:16px 16px 0 0;pointer-events:none}
  .exploit-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,rgba(120,80,255,0),rgba(160,100,255,0.9),rgba(120,80,255,0));opacity:0;transition:opacity 0.3s;border-radius:3px 0 0 3px}
  .exploit-btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.18);transform:translateX(5px);box-shadow:0 1px 0 rgba(255,255,255,0.1) inset,0 4px 20px rgba(0,0,0,0.2)}
  .exploit-btn:hover::before{opacity:1}
  .exploit-btn.open{background:rgba(120,80,255,0.08);border-color:rgba(140,100,255,0.3);border-bottom-left-radius:0;border-bottom-right-radius:0}
  .exploit-btn.open::before{opacity:1}

  .chevron{font-size:11px;opacity:0.3;transition:transform 0.3s,opacity 0.3s;display:inline-block;position:relative;z-index:1}
  .exploit-btn.open .chevron{transform:rotate(180deg);opacity:0.7}

  .dropdown{max-height:0;overflow:hidden;transition:max-height 0.38s cubic-bezier(0.4,0,0.2,1),opacity 0.28s;opacity:0;background:rgba(255,255,255,0.02);border:1px solid rgba(140,100,255,0.2);border-top:none;border-bottom-left-radius:16px;border-bottom-right-radius:16px;backdrop-filter:blur(30px)}
  .dropdown.show{max-height:76px;opacity:1}
  .dropdown-inner{display:flex;gap:10px;padding:14px 18px}

  .sub-btn{
    display:flex;align-items:center;gap:8px;
    height:36px;padding:0 16px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    color:rgba(255,255,255,0.7);

  .sub-btn svg{width:14px;height:14px;opacity:0.65;flex-shrink:0;position:relative;z-index:1}
  .sub-btn span{position:relative;z-index:1}

  .num{font-size:11px;color:rgba(255,255,255,0.18);font-weight:400;margin-right:6px;font-variant-numeric:tabular-nums;min-width:22px;position:relative;z-index:1}
  .exploit-name{position:relative;z-index:1}
</style>
</head>

const discIcon=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`;
const webIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

let dropdownCounter=0;

function buildPanel(panelId,items){
  const panel=document.getElementById('panel-'+panelId);
  items.forEach((e,i)=>{
    const id='dd'+(dropdownCounter++);
    const wrap=document.createElement('div');
    wrap.className='exploit-item';
    wrap.style.animationDelay=(i*0.045)+'s';
    wrap.innerHTML=`
      <button class="exploit-btn" onclick="toggle(this,'${id}')">
        <span><span class="num">${String(i+1).padStart(2,'0')}</span><span class="exploit-name">${e.name}</span></span>
        <span class="chevron">▼</span>
      </button>
      <div class="dropdown" id="${id}">
        <div class="dropdown-inner">
          <a href="${e.web}" target="_blank" class="sub-btn">${webIcon}<span>Website</span></a>
          <a href="${e.disc}" target="_blank" class="sub-btn">${discIcon}<span>Discord</span></a>
        </div>
      </div>`;
    panel.appendChild(wrap);
  });
}

Object.keys(data).forEach(k=>buildPanel(k,data[k]));

function toggle(btn,id){
  const dd=document.getElementById(id);
  const isOpen=dd.classList.contains('show');
  document.querySelectorAll('.dropdown.show').forEach(d=>{
    d.classList.remove('show');
    d.previousElementSibling.classList.remove('open');
  });
  if(!isOpen){dd.classList.add('show');btn.classList.add('open')}
}

function switchTab(tab,el){
  document.querySelectorAll('.exploit-panel').forEach(p=>p.classList.remove('visible'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('visible');
  el.classList.add('active');
  document.querySelectorAll('.dropdown.show').forEach(d=>{d.classList.remove('show');d.previousElementSibling.classList.remove('open')});
}

function switchPage(id){
  const home=document.getElementById('homePage');
  const exploit=document.getElementById('exploitPage');
  const dh=document.getElementById('dockHome');
  const de=document.getElementById('dockExploit');
  if(id==='exploitPage'){
    home.classList.add('page-hidden');exploit.classList.remove('page-hidden');
    dh.classList.remove('active');de.classList.add('active');
  } else {
    exploit.classList.add('page-hidden');home.classList.remove('page-hidden');
    de.classList.remove('active');dh.classList.add('active');
  }
}

// Particles
const pc=document.getElementById('particles');
for(let i=0;i<28;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(10+Math.random()*18)+'s';
  p.style.animationDelay=(-Math.random()*26)+'s';
  const size=(Math.random()>0.6?3:2)+'px';
  p.style.width=p.style.height=size;
  const colors=['rgba(160,120,255,0.7)','rgba(100,160,255,0.6)','rgba(200,150,255,0.5)','rgba(80,200,255,0.4)'];
  p.style.background=colors[Math.floor(Math.random()*colors.length)];
  pc.appendChild(p);
}

document.getElementById('dockHome').classList.add('active');
</script>
</body>
</html>
